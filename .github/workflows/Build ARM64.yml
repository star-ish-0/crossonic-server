# Compila crossonic-server + crossonic-admin nativamente para linux/arm64,
# usando um runner ARM64 de verdade (sem QEMU/Docker) dentro de um container
# debian:trixie — para casar a versão do glibc com a do seu proot-distro.
#
# Salve este arquivo em: .github/workflows/build-arm64-termux.yml

name: Build ARM64 (Termux/proot-distro)

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  build:
    # Runner ARM64 nativo e gratuito do GitHub (sem emulação)
    runs-on: ubuntu-24.04-arm
    container:
      image: debian:trixie

    steps:
      - name: Instalar dependências de build
        run: |
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            git \
            ca-certificates \
            curl \
            libtag1-dev \
            zlib1g-dev
          git config --global --add safe.directory '*'

      - name: Checkout
        uses: actions/checkout@v6

      - name: Instalar Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"

      - name: Definir versão
        id: version
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "VERSION=dev-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          fi

      - name: Compilar
        env:
          CGO_ENABLED: "1"
          GOOS: linux
          GOARCH: arm64
        run: |
          mkdir -p dist
          go build -ldflags "-s -w -X github.com/juho05/crossonic-server.Version=${{ steps.version.outputs.VERSION }}" \
            -o dist/crossonic-server ./cmd/server
          go build -ldflags "-s -w -X github.com/juho05/crossonic-server.Version=${{ steps.version.outputs.VERSION }}" \
            -o dist/crossonic-admin ./cmd/admin

      - name: Empacotar
        run: |
          cd dist
          tar -czf crossonic-server-${{ steps.version.outputs.VERSION }}-linux-arm64-debian-trixie.tar.gz \
            crossonic-server crossonic-admin

      - name: Upload artifact (todo push/dispatch)
        uses: actions/upload-artifact@v4
        with:
          name: crossonic-server-linux-arm64-debian-trixie
          path: dist/*.tar.gz
          retention-days: 30

      - name: Publicar na Release (somente em tags)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.tar.gz
